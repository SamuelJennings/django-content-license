name: Tests

on:
  push:
    branches:
      - main
    paths:
      - 'licensing/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/tests.yml'
  # No paths filter on pull_request: these checks are ruleset-required, and a
  # path-filtered required check never reports on out-of-scope PRs, blocking merge.
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  call-tests:
    uses: django-mvp/shared/.github/workflows/tests.yml@main
    with:
      coverage-package: licensing
      django-versions: '["5.2", "6.0"]'
      # licensing keeps its test/lint tooling in a single (non-optional) dev
      # group rather than a separate `test` group, so the default `--with test`
      # would fail. Empty args install main + dev, which covers pytest.
      poetry-install-args: ''
    secrets: inherit
